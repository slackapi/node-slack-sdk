version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/packages/cli-hooks"
    groups:
      dev-sinon:
        dependency-type: "development"
        patterns:
          - "@types/sinon"
          - "sinon"
      dev-mocha:
        dependency-type: "development"
        patterns:
          - "@types/mocha"
          - "mocha"
    labels:
      - "dependencies"
      - "javascript"
      - "pkg:cli-hooks"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/cli-test"
    groups:
      dev-sinon:
        dependency-type: "development"
        patterns:
          - "@types/sinon"
          - "sinon"
      dev-chai:
        dependency-type: "development"
        patterns:
          - "@types/chai"
          - "chai"
      dev-mocha:
        dependency-type: "development"
        patterns:
          - "@types/mocha"
          - "mocha"
    labels:
      - "dependencies"
      - "javascript"
      - "pkg:cli-test"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/logger"
    groups:
      dev-sinon:
        dependency-type: "development"
        patterns:
          - "@types/sinon"
          - "sinon"
      dev-chai:
        dependency-type: "development"
        patterns:
          - "@types/chai"
          - "chai"
      dev-mocha:
        dependency-type: "development"
        patterns:
          - "@types/mocha"
          - "mocha"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "19.x"
          - "20.x"
          - "21.x"
          - "22.x"
          - "23.x"
          - "24.x"
          - "25.x"
          - "26.x"
    labels:
      - "dependencies"
      - "javascript"
      - "pkg:logger"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/oauth"
    groups:
      slack:
        patterns:
          - "@slack/*"
      dev-sinon:
        dependency-type: "development"
        patterns:
          - "@types/sinon"
          - "sinon"
      dev-chai:
        dependency-type: "development"
        patterns:
          - "@types/chai"
          - "chai"
      dev-mocha:
        dependency-type: "development"
        patterns:
          - "@types/mocha"
          - "mocha"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "19.x"
          - "20.x"
          - "21.x"
          - "22.x"
          - "23.x"
          - "24.x"
          - "25.x"
          - "26.x"
    labels:
      - "dependencies"
      - "javascript"
      - "pkg:oauth"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/socket-mode"
    groups:
      slack:
        patterns:
          - "@slack/*"
      dev-sinon:
        dependency-type: "development"
        patterns:
          - "@types/sinon"
          - "sinon"
      dev-chai:
        dependency-type: "development"
        patterns:
          - "@types/chai"
          - "chai"
      dev-mocha:
        dependency-type: "development"
        patterns:
          - "@types/mocha"
          - "mocha"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "19.x"
          - "20.x"
          - "21.x"
          - "22.x"
          - "23.x"
          - "24.x"
          - "25.x"
          - "26.x"
    labels:
      - "dependencies"
      - "javascript"
      - "pkg:socket-mode"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/types"
    labels:
      - "dependencies"
      - "javascript"
      - "pkg:types"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directories:
      - "/packages/web-api"
      - "/packages/web-api/test/integration-tests/**"
    groups:
      slack:
        patterns:
          - "@slack/*"
      dev-sinon:
        dependency-type: "development"
        patterns:
          - "@types/sinon"
          - "sinon"
      dev-chai:
        dependency-type: "development"
        patterns:
          - "@types/chai"
          - "chai"
      dev-mocha:
        dependency-type: "development"
        patterns:
          - "@types/mocha"
          - "mocha"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "19.x"
          - "20.x"
          - "21.x"
          - "22.x"
          - "23.x"
          - "24.x"
          - "25.x"
          - "26.x"
    labels:
      - "dependencies"
      - "javascript"
      - "pkg:web-api"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/webhook"
    groups:
      dev-chai:
        dependency-type: "development"
        patterns:
          - "@types/chai"
          - "chai"
      dev-mocha:
        dependency-type: "development"
        patterns:
          - "@types/mocha"
          - "mocha"
    ignore:
      # p-retry is pure ESM and raises its minimum Node.js version each major
      # (v7 requires Node >= 20, v8 requires Node >= 22). Bumping it can force a
      # change to this package's own supported Node floor, so maintainers must
      # upgrade it deliberately rather than via automated PRs.
      - dependency-name: "p-retry"
      - dependency-name: "@types/node"
        versions:
          - "19.x"
          - "20.x"
          - "21.x"
          - "22.x"
          - "23.x"
          - "24.x"
          - "25.x"
          - "26.x"
    labels:
      - "dependencies"
      - "javascript"
      - "pkg:webhook"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directories:
      - "/examples/*"
    groups:
      slack:
        patterns:
          - "@slack/*"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "25.x"
          - "26.x"
    labels:
      - "area:examples"
      - "dependencies"
      - "javascript"
    schedule:
      interval: "monthly"

  - package-ecosystem: "github-actions"
    directory: "/"
    labels:
      - "dependencies"
      - "github_actions"
    schedule:
      interval: "monthly"

  - package-ecosystem: "npm"
    directory: "/"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "19.x"
          - "20.x"
          - "21.x"
          - "22.x"
          - "23.x"
          - "24.x"
          - "25.x"
          - "26.x"
    labels:
      - "dependencies"
      - "javascript"
    schedule:
      interval: "weekly"
